<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SPro Countdown</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SPro Countdown">
<meta name="theme-color" content="#0B0D12">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">
<style>
  :root {
    --stage: #0B0D12;
    --panel: #161A22;
    --panel-2: #1E2430;
    --line: #2A3140;
    --ink: #F0EEE8;
    --ink-dim: #9AA3B2;
    --accent: #E3A44A;
    --bright: #FFD60A;
    --over: #E25C4A;
    --radius: 14px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--stage);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  button {
    font: inherit;
    color: inherit;
    background: none;
    border: none;
    cursor: pointer;
    touch-action: manipulation;
  }
  button:focus-visible, input:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* ---------- Setup screen ---------- */
  #setup {
    height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    justify-content: center;
    padding: 24px 16px 48px;
  }
  .card {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-top: 8px;
  }
  .brand h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: .01em;
    margin: 0;
  }
  .brand .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--over);
    align-self: center;
    box-shadow: 0 0 8px rgba(226,92,74,.7);
  }
  .brand span { color: var(--ink-dim); font-size: 13px; }
  label.field-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 7px;
  }
  #labelInput {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--ink);
    padding: 14px 16px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    font-family: inherit;
    resize: none;
    line-height: 1.3;
  }
  #labelInput::placeholder { color: #5B6474; font-weight: 500; }
  .settings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .setting {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .stepper {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .stepper button {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: var(--panel-2);
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
  }
  .stepper button:active { background: var(--line); }
  .stepper .val {
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    text-align: center;
    flex: 1;
  }
  .stepper .val input {
    width: 100%;
    background: none;
    border: none;
    border-radius: 8px;
    color: var(--ink);
    font: inherit;
    font-variant-numeric: tabular-nums;
    text-align: center;
    padding: 2px 0;
  }
  .stepper .val input:focus {
    background: var(--panel-2);
  }
  .stepper .val small {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-dim);
  }
  #startBtn {
    margin-top: 4px;
    padding: 18px;
    border-radius: var(--radius);
    background: var(--accent);
    color: #1A1408;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: .02em;
  }
  #startBtn:active { filter: brightness(.92); }
  #setupClock {
    text-align: center;
    font-size: 36px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: .04em;
    color: var(--bright);
  }

  /* ---------- Timer screen ---------- */
  #timerScreen {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    background: var(--stage);
  }
  #timerScreen.active { display: flex; }

  #labelZone {
    flex: 0 0 25%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: max(10px, env(safe-area-inset-top)) 16px 0;
  }
  #labelText {
    font-size: min(8.5vw, 11vh);
    font-weight: 800;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink);
    text-align: center;
    text-wrap: balance;
    white-space: pre-line;
    line-height: 1.15;
    cursor: pointer;
    border-bottom: 3px dashed transparent;
  }
  #timerScreen.paused #labelText { border-bottom-color: var(--line); }
  #labelEdit {
    display: none;
    width: 92%;
    max-height: 100%;
    font-size: min(8.5vw, 11vh);
    font-weight: 800;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink);
    text-align: center;
    line-height: 1.15;
    background: var(--panel);
    border: 2px solid var(--accent);
    border-radius: var(--radius);
    padding: .05em .2em;
    font-family: inherit;
    resize: none;
    overflow-y: auto;
  }
  #labelZone.editing #labelText { display: none; }
  #labelZone.editing #labelEdit { display: block; }

  #clock {
    position: absolute;
    top: max(10px, env(safe-area-inset-top));
    right: 14px;
    z-index: 3;
    font-size: min(5vw, 6.5vh);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: .04em;
    color: var(--bright);
  }

  #timeZone {
    flex: 1 1 75%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 0;
  }
  #timeText {
    font-size: min(29vw, 54vh);
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: .02em;
    line-height: 1;
    color: var(--bright);
    transition: color .3s;
  }
  #timeText.over {
    color: var(--over);
    animation: overPulse 1s ease-in-out infinite;
  }
  #timeText.over .plus { font-size: .55em; vertical-align: .28em; margin-right: .04em; }
  @keyframes overPulse {
    50% { opacity: .55; }
  }
  @media (prefers-reduced-motion: reduce) {
    #timeText.over { animation: none; }
  }

  /* swapped: title fills the middle, countdown small on top */
  #timerScreen.swapped #timeZone {
    order: -1;
    flex: 0 0 25%;
    padding-top: max(10px, env(safe-area-inset-top));
  }
  #timerScreen.swapped #timeText { font-size: min(10vw, 15vh); }
  #timerScreen.swapped #labelZone {
    flex: 1 1 75%;
    padding: 0 16px;
  }
  #timerScreen.swapped #labelText,
  #timerScreen.swapped #labelEdit {
    font-size: min(5.8vw, 10vh); /* ~20 uppercase characters per line */
    letter-spacing: .08em;
  }

  #pausedBadge {
    position: absolute;
    bottom: calc(max(12px, env(safe-area-inset-bottom)) + 82px);
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(22,26,34,.88);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 7px 18px;
    display: none;
  }
  #timerScreen.paused #pausedBadge { display: block; }

  #controls {
    position: absolute;
    bottom: max(12px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(22,26,34,.88);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 8px;
    z-index: 3;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: .35;
    transition: opacity .25s;
  }
  #controls:hover, #timerScreen.paused #controls { opacity: 1; }
  #controls button {
    min-width: 56px;
    height: 56px;
    border-radius: 999px;
    background: transparent;
    color: var(--ink);
    font-size: 16px;
    font-weight: 600;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    padding: 0 12px;
  }
  #controls button:active { background: var(--panel-2); }
  #controls button small {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  #playBtn {
    background: var(--accent) !important;
    color: #1A1408 !important;
    min-width: 68px !important;
    font-size: 24px !important;
  }
  #exitBtn {
    position: absolute;
    top: max(10px, env(safe-area-inset-top));
    left: 14px;
    z-index: 3;
    height: 44px;
    padding: 0 16px;
    border-radius: 999px;
    background: rgba(22,26,34,.88);
    border: 1px solid var(--line);
    color: var(--ink-dim);
    font-size: 14px;
    font-weight: 600;
    opacity: .35;
    transition: opacity .25s;
  }
  #exitBtn:hover, #timerScreen.paused #exitBtn { opacity: 1; }

  /* ---------- Attention flash (red/blue) ---------- */
  #timerScreen.flashing { animation: flashRB .8s linear infinite; }
  @keyframes flashRB {
    0%, 49% { background-color: #B30E1E; }
    50%, 100% { background-color: #1440C4; }
  }
  #timerScreen.flashing #timeText,
  #timerScreen.flashing #timeText.over { color: #FFFFFF; animation: none; }
  #timerScreen.flashing #flashBtn {
    background: var(--over);
    color: #fff;
  }
  #timerScreen.flashing #flashBtn small { color: rgba(255,255,255,.8); }

  /* ---------- Slide-in time drawer ---------- */
  #drawer {
    position: absolute;
    top: 50%;
    right: 0;
    transform: translate(100%, -50%);
    transition: transform .3s ease;
    z-index: 4;
  }
  #drawer.open { transform: translate(0, -50%); }
  #drawerTab {
    position: absolute;
    left: -40px;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;
    height: 72px;
    background: rgba(22,26,34,.88);
    border: 1px solid var(--line);
    border-right: none;
    border-radius: 12px 0 0 12px;
    color: var(--ink-dim);
    font-size: 22px;
    opacity: .35;
    transition: opacity .25s;
  }
  #drawerTab:hover, #drawer.open #drawerTab, #timerScreen.paused #drawerTab { opacity: 1; }
  #drawerBody {
    width: 240px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-right: none;
    border-radius: var(--radius) 0 0 var(--radius);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #drawerBody .stepper button {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--panel-2);
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
  }
  #drawerBody .stepper button:active { background: var(--line); }
  #applyTimeBtn {
    padding: 13px;
    border-radius: 10px;
    background: var(--accent);
    color: #1A1408;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: .04em;
  }
  #applyTimeBtn:active { filter: brightness(.92); }
</style>
</head>
<body>

<div id="setup">
  <div class="card">
    <div class="brand">
      <div class="dot"></div>
      <h1>SPro Countdown</h1>
      <span>countdown &amp; overtime</span>
    </div>

    <div>
      <label class="field-label" for="labelInput">Title</label>
      <textarea id="labelInput" rows="2" placeholder="PREPARATION" autocomplete="off"></textarea>
    </div>

    <div class="settings">
      <div class="setting">
        <label class="field-label">Minutes</label>
        <div class="stepper">
          <button type="button" data-step="min" data-d="-1" aria-label="Fewer minutes">−</button>
          <div class="val"><input id="minVal" type="text" inputmode="numeric" value="10" autocomplete="off" aria-label="Minutes"><small>min</small></div>
          <button type="button" data-step="min" data-d="1" aria-label="More minutes">+</button>
        </div>
      </div>
      <div class="setting">
        <label class="field-label">Seconds</label>
        <div class="stepper">
          <button type="button" data-step="sec" data-d="-1" aria-label="Fewer seconds">−</button>
          <div class="val"><input id="secVal" type="text" inputmode="numeric" value="00" autocomplete="off" aria-label="Seconds"><small>sec</small></div>
          <button type="button" data-step="sec" data-d="1" aria-label="More seconds">+</button>
        </div>
      </div>
    </div>

    <button id="startBtn" type="button">START TIMER</button>
    <div id="setupClock">00:00:00</div>
  </div>
</div>

<div id="timerScreen">
  <div id="labelZone">
    <div id="labelText">PREPARATION</div>
    <textarea id="labelEdit" rows="1" autocomplete="off" aria-label="Edit title"></textarea>
  </div>
  <div id="timeZone">
    <div id="timeText">10:00</div>
  </div>
  <div id="pausedBadge">Paused</div>
  <button id="exitBtn" type="button">✕ Exit</button>
  <div id="clock">00:00:00</div>
  <div id="controls">
    <button type="button" id="restartBtn">⟲<small>Restart</small></button>
    <button type="button" id="minusBtn">−1<small>min</small></button>
    <button type="button" id="playBtn" aria-label="Play or pause">▶</button>
    <button type="button" id="plusBtn">+1<small>min</small></button>
    <button type="button" id="swapBtn">⇅<small>Swap</small></button>
    <button type="button" id="flashBtn">⚡<small>Flash</small></button>
  </div>
  <div id="drawer">
    <button type="button" id="drawerTab" aria-label="Set new time">‹</button>
    <div id="drawerBody">
      <label class="field-label">Set New Time</label>
      <div class="stepper">
        <button type="button" data-nstep="min" data-d="-1" aria-label="Fewer minutes">−</button>
        <div class="val"><input id="nextMin" type="text" inputmode="numeric" value="10" autocomplete="off" aria-label="Minutes"><small>min</small></div>
        <button type="button" data-nstep="min" data-d="1" aria-label="More minutes">+</button>
      </div>
      <div class="stepper">
        <button type="button" data-nstep="sec" data-d="-1" aria-label="Fewer seconds">−</button>
        <div class="val"><input id="nextSec" type="text" inputmode="numeric" value="00" autocomplete="off" aria-label="Seconds"><small>sec</small></div>
        <button type="button" data-nstep="sec" data-d="1" aria-label="More seconds">+</button>
      </div>
      <button type="button" id="applyTimeBtn">APPLY &amp; RESTART</button>
    </div>
  </div>
</div>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(function () {});
}

(function () {
  "use strict";

  var LS_KEY = "stagetimer-v1";

  var state = {
    label: "PREPARATION",
    minutes: 10,
    seconds: 0
  };

  // ----- persistence -----
  try {
    var saved = JSON.parse(localStorage.getItem(LS_KEY) || "null");
    if (saved && typeof saved === "object") {
      for (var k in state) if (k in saved) state[k] = saved[k];
    }
  } catch (e) {}

  function persist() {
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {}
  }

  // ----- elements -----
  var $ = function (id) { return document.getElementById(id); };
  var setup = $("setup"), screen = $("timerScreen");
  var labelInput = $("labelInput"), labelText = $("labelText");
  var labelZone = $("labelZone"), labelEdit = $("labelEdit");
  var timeText = $("timeText"), timeZone = $("timeZone");
  var clockEl = $("clock");
  var playBtn = $("playBtn");

  // ----- setup screen wiring -----
  labelInput.value = state.label;

  var minVal = $("minVal"), secVal = $("secVal");

  function renderSetup() {
    minVal.value = state.minutes;
    secVal.value = (state.seconds < 10 ? "0" : "") + state.seconds;
  }

  document.querySelectorAll("[data-step]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var d = Number(btn.dataset.d);
      if (btn.dataset.step === "min") state.minutes = Math.min(180, Math.max(0, state.minutes + d));
      if (btn.dataset.step === "sec") state.seconds = (state.seconds + d * 5 + 60) % 60;
      renderSetup(); persist();
    });
  });

  // typed input: digits only while typing; clamp and save when done
  function wireTypedValue(input, max, commit) {
    input.addEventListener("focus", function () { input.select(); });
    input.addEventListener("input", function () {
      var v = input.value.replace(/\D/g, "");
      if (v !== input.value) input.value = v;
      if (v !== "") commit(Math.min(max, Number(v)));
    });
    input.addEventListener("blur", function () { renderSetup(); persist(); });
    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") input.blur();
    });
  }
  wireTypedValue(minVal, 180, function (v) { state.minutes = v; });
  wireTypedValue(secVal, 59, function (v) { state.seconds = v; });

  labelInput.addEventListener("input", function () {
    state.label = labelInput.value;
    persist();
  });

  renderSetup();

  // ----- timer state -----
  var running = false;      // timer screen is open
  var playing = false;      // clock advancing
  var elapsedMs = 0;        // time spent so far
  var extraMs = 0;          // live +1/−1 adjustments
  var lastTick = 0;
  var timerId = 0;
  var wakeLock = null;
  var shownTime = "";       // last rendered strings — skip DOM writes
  var shownClock = "";      // when nothing changed (battery)

  function totalMs() {
    return (state.minutes * 60 + state.seconds) * 1000 + extraMs;
  }

  function fmt(totalSec) {
    var m = Math.floor(totalSec / 60);
    var s = totalSec % 60;
    return m + ":" + (s < 10 ? "0" : "") + s;
  }

  function renderTimer() {
    var remainMs = totalMs() - elapsedMs;
    var over = remainMs <= 0;
    var txt = over ? "+" + fmt(Math.floor(-remainMs / 1000)) : fmt(Math.ceil(remainMs / 1000));
    if (txt === shownTime) return;
    shownTime = txt;
    if (over) {
      timeText.innerHTML = '<span class="plus">+</span>' + txt.slice(1);
      timeText.classList.add("over");
    } else {
      timeText.textContent = txt;
      timeText.classList.remove("over");
    }
  }

  function pad2(n) { return (n < 10 ? "0" : "") + n; }

  function nowHMS() {
    var d = new Date();
    return pad2(d.getHours()) + ":" + pad2(d.getMinutes()) + ":" + pad2(d.getSeconds());
  }

  function renderClock() {
    var t = nowHMS();
    if (t === shownClock) return;
    shownClock = t;
    clockEl.textContent = t;
  }

  var setupClock = $("setupClock");
  var shownSetupClock = "";
  function renderSetupClock() {
    var t = nowHMS();
    if (t === shownSetupClock) return;
    shownSetupClock = t;
    setupClock.textContent = t;
  }
  renderSetupClock();
  setInterval(renderSetupClock, 250);

  // 4 ticks/s (instead of a 60–120 fps rAF loop) is plenty for a
  // once-per-second display and lets the CPU/GPU idle between updates.
  function tick() {
    if (!running) return;
    var now = performance.now();
    if (playing) {
      elapsedMs += now - lastTick;
      renderTimer();
    }
    lastTick = now;
    renderClock();
  }

  function setPlaying(p) {
    playing = p;
    screen.classList.toggle("paused", !p);
    playBtn.textContent = p ? "❚❚" : "▶";
  }

  function enterTimer() {
    state.label = labelInput.value.trim() || "PREPARATION";
    labelInput.value = state.label;
    persist();
    labelText.textContent = state.label;
    elapsedMs = 0;
    extraMs = 0;
    shownTime = "";
    shownClock = "";
    renderTimer();
    renderClock();
    setup.style.display = "none";
    screen.classList.remove("swapped");
    screen.classList.remove("flashing");
    setDrawer(false);
    screen.classList.add("active");
    setPlaying(true);
    running = true;
    lastTick = performance.now();
    timerId = setInterval(tick, 250);
    requestWakeLock();
  }

  function exitTimer() {
    running = false;
    clearInterval(timerId);
    releaseWakeLock();
    screen.classList.remove("active");
    screen.classList.remove("flashing");
    setDrawer(false);
    setup.style.display = "flex";
  }

  function restart() {
    elapsedMs = 0;
    extraMs = 0;
    renderTimer();
    setPlaying(false);
  }

  // ----- wake lock (keeps the screen on while the timer runs) -----
  function requestWakeLock() {
    if (!("wakeLock" in navigator)) return;
    navigator.wakeLock.request("screen").then(function (wl) {
      wakeLock = wl;
    }).catch(function () {});
  }
  function releaseWakeLock() {
    if (wakeLock) { wakeLock.release().catch(function () {}); wakeLock = null; }
  }
  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "visible" && running) requestWakeLock();
  });

  // ----- controls -----
  $("startBtn").addEventListener("click", enterTimer);
  $("exitBtn").addEventListener("click", function (e) { e.stopPropagation(); exitTimer(); });
  $("restartBtn").addEventListener("click", function (e) { e.stopPropagation(); restart(); });
  playBtn.addEventListener("click", function (e) { e.stopPropagation(); setPlaying(!playing); });
  $("plusBtn").addEventListener("click", function (e) {
    e.stopPropagation(); extraMs += 60000; renderTimer();
  });
  $("minusBtn").addEventListener("click", function (e) {
    e.stopPropagation(); extraMs -= 60000; renderTimer();
  });
  $("swapBtn").addEventListener("click", function (e) {
    e.stopPropagation(); screen.classList.toggle("swapped");
  });
  document.querySelectorAll("#controls, #exitBtn, #drawer").forEach(function (el) {
    el.addEventListener("click", function (e) { e.stopPropagation(); });
  });

  // ----- attention flash (red/blue) -----
  $("flashBtn").addEventListener("click", function (e) {
    e.stopPropagation();
    screen.classList.toggle("flashing");
  });

  // ----- slide-in drawer: prepare a new time while the timer keeps running -----
  var drawer = $("drawer"), drawerTab = $("drawerTab");
  var nextMin = $("nextMin"), nextSec = $("nextSec");

  function fillDrawer() {
    nextMin.value = state.minutes;
    nextSec.value = pad2(state.seconds);
  }

  function setDrawer(open) {
    drawer.classList.toggle("open", open);
    drawerTab.textContent = open ? "›" : "‹";
    if (open) fillDrawer();
  }

  drawerTab.addEventListener("click", function (e) {
    e.stopPropagation();
    setDrawer(!drawer.classList.contains("open"));
  });

  document.querySelectorAll("[data-nstep]").forEach(function (btn) {
    btn.addEventListener("click", function (e) {
      e.stopPropagation();
      var d = Number(btn.dataset.d);
      if (btn.dataset.nstep === "min") {
        nextMin.value = Math.min(180, Math.max(0, (Number(nextMin.value) || 0) + d));
      } else {
        nextSec.value = pad2(((Number(nextSec.value) || 0) + d * 5 + 60) % 60);
      }
    });
  });

  [nextMin, nextSec].forEach(function (input) {
    input.addEventListener("focus", function () { input.select(); });
    input.addEventListener("input", function () {
      var v = input.value.replace(/\D/g, "");
      if (v !== input.value) input.value = v;
    });
    input.addEventListener("keydown", function (e) {
      e.stopPropagation();
      if (e.key === "Enter") input.blur();
    });
  });

  $("applyTimeBtn").addEventListener("click", function (e) {
    e.stopPropagation();
    state.minutes = Math.min(180, Math.max(0, Number(nextMin.value) || 0));
    state.seconds = Math.min(59, Number(nextSec.value) || 0);
    persist();
    renderSetup();
    elapsedMs = 0;
    extraMs = 0;
    renderTimer();
    setPlaying(true);
    setDrawer(false);
  });

  // ----- edit title in place (timer keeps running) -----
  function commitLabel() {
    var v = labelEdit.value.trim();
    if (v) {
      state.label = v;
      labelInput.value = v;
      persist();
    }
    labelText.textContent = state.label;
    labelZone.classList.remove("editing");
  }

  function growLabelEdit() {
    labelEdit.style.height = "auto";
    labelEdit.style.height = labelEdit.scrollHeight + "px";
  }

  labelZone.addEventListener("click", function (e) {
    e.stopPropagation(); // don't toggle pause
    if (labelZone.classList.contains("editing")) return;
    labelEdit.value = state.label;
    labelZone.classList.add("editing");
    growLabelEdit();
    labelEdit.focus();
    labelEdit.select();
  });
  labelEdit.addEventListener("input", growLabelEdit);
  labelEdit.addEventListener("blur", commitLabel);
  labelEdit.addEventListener("keydown", function (e) {
    e.stopPropagation(); // Enter adds a new line; hide keyboard / tap outside finishes
    if (e.key === "Escape") { labelEdit.value = state.label; labelEdit.blur(); }
  });

  // Keyboard (handy on a computer or with an iPad keyboard)
  document.addEventListener("keydown", function (e) {
    if (!running) return;
    if (e.code === "Space") { e.preventDefault(); setPlaying(!playing); }
    if (e.key === "ArrowUp") { extraMs += 60000; renderTimer(); }
    if (e.key === "ArrowDown") { extraMs -= 60000; renderTimer(); }
    if (e.key === "Escape") exitTimer();
  });
})();
</script>
</body>
</html>
